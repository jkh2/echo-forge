<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoForge Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-200 p-8 max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-8">
    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-violet-500 flex items-center justify-center">
      <span class="text-white text-xl font-bold">EF</span>
    </div>
    <h1 class="text-3xl font-semibold tracking-tight">EchoForge Settings</h1>
  </div>

  <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
    <h2 class="text-lg font-medium mb-4">General</h2>
    
    <div class="space-y-4">
      <div>
        <label class="block text-sm text-zinc-400 mb-1">Default Export Format</label>
        <select class="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 w-full text-sm">
          <option>Markdown (.md)</option>
          <option>JSON</option>
          <option>Markdown + JSON</option>
        </select>
      </div>

      <div class="pt-4 border-t border-zinc-800">
        <p class="text-sm text-zinc-500">
          More settings (Notion integration, local export paths, custom templates, metadata options) will appear here as we progress through the phases.
        </p>
      </div>
    </div>
  </div>

  <p class="text-xs text-zinc-600 mt-6 text-center">
    Phase 0 • Settings page stub • Full options coming in Phase 4
  </p>
</body>
</html>
