<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .logo-gradient { background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="w-[380px] bg-zinc-950 text-zinc-200">
  <div class="p-5">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-5">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-violet-500 flex items-center justify-center">
        <span class="text-white text-xl font-bold">EF</span>
      </div>
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">EchoForge</h1>
        <p class="text-xs text-zinc-500 -mt-0.5">AI Chat Exporter • v0.1.0</p>
      </div>
    </div>

    <!-- Status -->
    <div id="status" class="hidden mb-4 px-3 py-2 rounded-lg text-sm flex items-center gap-2">
      <!-- Dynamic status populated by JS -->
    </div>

    <!-- Main Action -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 mb-4">
      <div class="mb-3">
        <div class="text-sm font-medium text-zinc-400 mb-1">Current page</div>
        <div id="current-site" class="text-sm font-mono text-emerald-400 truncate">Detecting...</div>
      </div>

      <button id="export-btn"
              class="w-full bg-white hover:bg-zinc-100 active:bg-zinc-200 transition-colors text-zinc-950 font-semibold py-3.5 rounded-xl flex items-center justify-center gap-2 text-base shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v-4m0 0l4 4m-4-4l4-4m12 0v4m0 0l-4-4m4 4l-4 4" />
        </svg>
        <span>Export Current Conversation</span>
      </button>

      <div class="mt-3 flex gap-2">
        <button id="copy-md-btn"
                class="flex-1 text-xs bg-zinc-800 hover:bg-zinc-700 transition-colors py-2.5 rounded-xl font-medium flex items-center justify-center gap-1.5">
          <span>Copy MD</span>
        </button>
        <button id="settings-btn"
                class="flex-1 text-xs bg-zinc-800 hover:bg-zinc-700 transition-colors py-2.5 rounded-xl font-medium flex items-center justify-center gap-1.5">
          <span>Settings</span>
        </button>
      </div>
    </div>

    <!-- Quick Info -->
    <div class="text-[10px] text-zinc-500 px-1 flex justify-between items-center">
      <div>Claude • Grok • More coming</div>
      <div class="font-mono">Open Source</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
